add_product_via_ai:
  name: Analyze and sync product
  description: Analyze a product name with Grocy AI Assistant and sync the result to Grocy.
  fields:
    name:
      name: Product name
      description: Product name to analyze. If empty, the integration text entity is used.
      example: "Gala apples 1 kg"
      selector:
        text:

sync_product:
  name: Analyze and sync product
  description: Analyze a product name with Grocy AI Assistant and sync the result to Grocy.
  fields:
    name:
      name: Product name
      description: Product name to analyze. If empty, the integration text entity is used.
      example: "Gala apples 1 kg"
      selector:
        text:

notification_emit_event:
  name: Emit notification event
  description: Emit an internal notification event for the Grocy AI Assistant rule engine.
  fields:
    event_type:
      name: Event type
      description: Supported event type, for example item_added or shopping_due.
      required: true
      selector:
        text:
    title:
      name: Title
      description: Optional notification title.
      selector:
        text:
    message:
      name: Message
      description: Optional notification message body.
      selector:
        text:
    severity:
      name: Severity
      description: Notification severity level.
      selector:
        select:
          options:
            - info
            - warning
            - critical

notification_test_device:
  name: Send test notification to device
  description: Send a mobile push test notification to one configured target device.
  fields:
    target_id:
      name: Target ID
      description: Notification target ID, for example notify.mobile_app_pixel_8.
      required: true
      selector:
        text:

notification_test_all:
  name: Send test notification to all devices
  description: Send a mobile push test notification to all active target devices.

notification_test_persistent:
  name: Send persistent test notification
  description: Send a test notification using Home Assistant persistent notifications.

barcode_lookup:
  name: Look up barcode
  description: Look up a barcode with the Grocy AI Assistant add-on and update the barcode status entity.
  fields:
    barcode:
      name: Barcode
      description: Barcode value to look up.
      required: true
      example: "4008400402222"
      selector:
        text:

scanner_llava_analyze:
  name: Analyze image
  description: Analyze a Base64-encoded image with the Grocy AI Assistant image scanner and update the image analysis status entity.
  fields:
    image_base64:
      name: Image data (Base64)
      description: Base64-encoded image payload without a file path.
      required: true
      selector:
        text:

scan_image:
  name: Analyze image
  description: Analyze a Base64-encoded image with the Grocy AI Assistant image scanner and update the image analysis status entity.
  fields:
    image_base64:
      name: Image data (Base64)
      description: Base64-encoded image payload without a file path.
      required: true
      selector:
        text:
