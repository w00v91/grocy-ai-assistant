add_product_via_ai:
  name: Produkt via KI anlegen
  description: Übergibt den Produktnamen an das Grocy AI Add-on; das Add-on übernimmt Analyse und Grocy-Sync.
  fields:
    name:
      name: Produktname
      description: Der Name des Produkts (z.B. Milch, Äpfel). Wenn leer, wird das Textfeld der Integration genutzt.
      example: "Gala Äpfel 1kg"
      selector:
        text:

sync_product:
  name: Produkt mit Grocy synchronisieren
  description: Nutzt die dedizierte Add-on-v1-API für Analyse und Grocy-Synchronisierung.
  fields:
    name:
      name: Produktname
      description: Der Name des Produkts (z.B. Milch, Äpfel). Wenn leer, wird das Textfeld der Integration genutzt.
      example: "Gala Äpfel 1kg"
      selector:
        text:

notification_emit_event:
  name: Notification Event auslösen
  description: Triggert ein internes Notification-Event, das durch die Rule Engine verarbeitet wird.
  fields:
    event_type:
      name: Event-Typ
      description: Einer der unterstützten Eventtypen (z.B. item_added, shopping_due).
      required: true
      selector:
        text:
    title:
      name: Titel
      selector:
        text:
    message:
      name: Nachricht
      selector:
        text:
    severity:
      name: Severity
      selector:
        select:
          options:
            - info
            - warning
            - critical

notification_test_device:
  name: Testbenachrichtigung an Gerät
  description: Sendet eine Test-Push-Nachricht an ein spezifisches mobiles Ziel.
  fields:
    target_id:
      name: Ziel-ID
      description: Interne Ziel-ID, z.B. notify.mobile_app_pixel_8.
      required: true
      selector:
        text:

notification_test_all:
  name: Testbenachrichtigung an alle Geräte
  description: Sendet eine Test-Push-Nachricht an alle aktiven mobilen Ziele.

notification_test_persistent:
  name: Test als Persistent Notification
  description: Sendet eine Test-Nachricht in Home Assistant als persistent_notification.

barcode_lookup:
  name: Barcode nachschlagen
  description: Führt einen Barcode-Lookup über das Grocy AI Add-on aus und aktualisiert den Barcode-Statussensor mit dem letzten Ergebnis.
  fields:
    barcode:
      name: Barcode
      description: Die zu suchende Barcode-Nummer.
      required: true
      example: "4008400402222"
      selector:
        text:

scanner_llava_analyze:
  name: Bild per LLaVA analysieren
  description: Übergibt ein Base64-kodiertes Bild an den LLaVA-Scanner und aktualisiert den Scanner-Statussensor mit dem letzten Ergebnis.
  fields:
    image_base64:
      name: Bilddaten (Base64)
      description: Base64-kodiertes Bild ohne Dateipfad.
      required: true
      selector:
        text:

scan_image:
  name: Bild analysieren
  description: Nutzt die dedizierte Add-on-v1-API für Bildanalyse und aktualisiert den Scanner-Statussensor mit dem letzten Ergebnis.
  fields:
    image_base64:
      name: Bilddaten (Base64)
      description: Base64-kodiertes Bild ohne Dateipfad.
      required: true
      selector:
        text:
