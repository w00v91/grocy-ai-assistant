name: Grocy AI Assistant
version: 8.0.73
slug: grocy_ai_assistant
dependencies:
- a0d49513_grocy
description: AI assistant for Grocy
startup: services
boot: auto
init: false
arch:
- amd64
- aarch64
- armv7
map:
- config:rw
privileged:
- SYS_ADMIN
host_network: false
ingress: true
ingress_port: 8000
homeassistant_api: true
hassio_api: true
options:
  api_key: grocy-ai-assistant-C1LEbzNYdlsu_QGGLZYT-AAjBdsA66af
  notification_global_enabled: true
  dashboard_polling_interval_seconds: 5
  dashboard_search_guard_stale_seconds: 45
  grocy:
    grocy_api_key: DEIN_GROCY_KEY
    grocy_base_url: http://homeassistant.local:9192/api
  ollama:
    ollama_enabled: true
    ollama_text_generation_enabled: true
    ollama_image_generation_enabled: true
    ollama_url: http://homeassistant.local:11434/api/generate
    ollama_model: llama3
    ollama_llava_model: llava
    ollama_timeout_seconds: 60
    initial_info_sync: false
  scanner:
    scanner_barcode_fallback_seconds: 5
    scanner_llava_min_confidence: 75
    scanner_llava_timeout_seconds: 45
  cloud_ai:
    cloud_ai_enabled: false
    image_generation_enabled: false
    cloud_ai_text_generation_enabled: false
    openai_api_key: DEIN_OPENAI_KEY
    openai_image_model: gpt-image-1
    openai_text_model: gpt-4o-mini
    generate_missing_product_images_on_startup: false
  debug_mode: false
  auto_cleanup_enabled: false
  auto_cleanup_months: 6
schema:
  api_key: str
  notification_global_enabled: bool
  dashboard_polling_interval_seconds: int(1,60)
  dashboard_search_guard_stale_seconds: int(5,300)
  grocy:
    grocy_api_key: str
    grocy_base_url: str
  ollama:
    ollama_enabled: bool
    ollama_text_generation_enabled: bool
    ollama_image_generation_enabled: bool
    ollama_url: str
    ollama_model: str
    ollama_llava_model: str
    ollama_timeout_seconds: int(5,300)
    initial_info_sync: bool
  scanner:
    scanner_barcode_fallback_seconds: int(1,30)
    scanner_llava_min_confidence: int(1,100)
    scanner_llava_timeout_seconds: int(10,120)
  cloud_ai:
    cloud_ai_enabled: bool
    image_generation_enabled: bool
    cloud_ai_text_generation_enabled: bool
    openai_api_key: password
    openai_image_model: str
    openai_text_model: str
    generate_missing_product_images_on_startup: bool
  debug_mode: bool
  auto_cleanup_enabled: bool
  auto_cleanup_months: int(1,120)
