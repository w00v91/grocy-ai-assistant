configuration:
  api_key:
    name: "KI API-Key"
    description: "API-Schlüssel für die primäre KI-Verarbeitung (Text/Erkennung)."
  dashboard_polling_interval_seconds:
    name: "Aktualisierungsintervall (Sek.)"
    description: "Legt fest, in welchem Abstand das Dashboard seine Daten automatisch neu lädt."
  notification_global_enabled:
    name: "Benachrichtigungen · Global aktiv"
    description: "Aktiviert/deaktiviert Benachrichtigungen global für das Add-on."
  grocy:
    grocy_api_key:
      name: "Grocy API-Key"
      description: "API-Schlüssel deiner Grocy-Instanz."
    grocy_base_url:
      name: "Grocy Basis-URL"
      description: "Basis-URL der Grocy-API, z. B. http://homeassistant.local:9192/api."
  ollama:
    ollama_enabled:
      name: "Ollama aktiv"
      description: "Aktiviert lokale Ollama-Abfragen grundsätzlich."
    ollama_text_generation_enabled:
      name: "Ollama Texterstellung aktiv"
      description: "Aktiviert lokale Ollama-Textabfragen für Produktanalyse, Vorschläge und Rezepte."
    ollama_image_generation_enabled:
      name: "Ollama Bilderkennung aktiv"
      description: "Aktiviert lokale Ollama/LLaVA-Bildabfragen für Scanner-Bilderkennung."
    ollama_url:
      name: "Generate-Endpoint"
      description: "URL zum Ollama-Generate-Endpunkt für KI-Anfragen."
    ollama_model:
      name: "Standardmodell"
      description: "Ollama-Modell für die allgemeine Erkennung."
    ollama_llava_model:
      name: "Vision-Modell (LLaVA)"
      description: "Ollama-LLaVA-Modell für bildbasierte Erkennung."
    initial_info_sync:
      name: "Einmaliger Info-Sync beim Start"
      description: "Analysiert beim nächsten Add-on-Start bestehende Produkte einmalig und ergänzt fehlende Nährwerte sowie geschätzte MHD-Tage."
  scanner:
    scanner_barcode_fallback_seconds:
      name: "Barcode-Fallback (Sek.)"
      description: "Wartezeit in Sekunden, bevor auf alternative Scanner-Logik gewechselt wird."
    scanner_llava_min_confidence:
      name: "LLaVA Mindestvertrauen (%)"
      description: "Mindest-Konfidenz in Prozent für LLaVA-Scannerergebnisse."
    scanner_llava_timeout_seconds:
      name: "LLaVA Timeout (Sek.)"
      description: "Maximale Wartezeit in Sekunden für LLaVA-Scanneranfragen."
  cloud_ai:
    cloud_ai_enabled:
      name: "Cloud AI aktiv"
      description: "Aktiviert Cloud-AI-Funktionen grundsätzlich."
    image_generation_enabled:
      name: "Cloud-Bildgenerierung aktiv"
      description: "Aktiviert die KI-gestützte Generierung fehlender Produktbilder über Cloud AI."
    cloud_ai_text_generation_enabled:
      name: "Cloud AI Texterstellung aktiv"
      description: "Aktiviert Cloud-AI-Textabfragen für Produktanalyse, Vorschläge und Rezepte, wenn Ollama-Text deaktiviert ist."
    openai_api_key:
      name: "OpenAI API-Key"
      description: "OpenAI API-Schlüssel für die Bildgenerierung."
    openai_image_model:
      name: "OpenAI Bildmodell"
      description: "OpenAI-Modellname für die Bildgenerierung (z. B. gpt-image-1)."
    openai_text_model:
      name: "OpenAI Textmodell"
      description: "OpenAI-Modellname für Cloud-AI-Texterstellung (z. B. gpt-4o-mini)."
    generate_missing_product_images_on_startup:
      name: "Fehlende Bilder beim Start erzeugen"
      description: "Erzeugt beim Add-on-Start automatisch fehlende Produktbilder."
  debug_mode:
    name: "Debug-Modus"
    description: "Aktiviert ausführliche Debug-Logs zur Fehlersuche."
