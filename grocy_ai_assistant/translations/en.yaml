configuration:
  api_key:
    name: "AI API key"
    description: "API key for primary AI processing (text/detection)."
  dashboard_polling_interval_seconds:
    name: "Dashboard · Refresh interval (sec)"
    description: "Defines how often the dashboard automatically refreshes its data."
  notification_global_enabled:
    name: "Notifications · Globally enabled"
    description: "Globally enables/disables notifications for this add-on."
  grocy:
    grocy_api_key:
      name: "Grocy API key"
      description: "API key of your Grocy instance."
    grocy_base_url:
      name: "Grocy base URL"
      description: "Base URL of the Grocy API, e.g. http://homeassistant.local:9192/api."
  ollama:
    ollama_url:
      name: "Generate endpoint"
      description: "URL of the Ollama generate endpoint for AI requests."
    ollama_model:
      name: "Default model"
      description: "Ollama model used for general detection."
    ollama_llava_model:
      name: "Vision model (LLaVA)"
      description: "Ollama LLaVA model used for image-based detection."
    initial_info_sync:
      name: "One-time info sync on startup"
      description: "On the next add-on start, analyzes existing products once and fills in missing nutrition values and estimated best-before days."
  scanner:
    scanner_barcode_fallback_seconds:
      name: "Barcode fallback (sec)"
      description: "Delay in seconds before switching to fallback scanner logic."
    scanner_llava_min_confidence:
      name: "LLaVA minimum confidence (%)"
      description: "Minimum confidence in percent for LLaVA scanner results."
    scanner_llava_timeout_seconds:
      name: "LLaVA timeout (sec)"
      description: "Maximum wait time in seconds for LLaVA scanner requests."
  cloud_ai:
    image_generation_enabled:
      name: "Image generation enabled"
      description: "Enables AI-based generation of missing product images."
    openai_api_key:
      name: "OpenAI API key"
      description: "OpenAI API key used for image generation."
    openai_image_model:
      name: "OpenAI image model"
      description: "OpenAI model name used for image generation (e.g. gpt-image-1)."
    generate_missing_product_images_on_startup:
      name: "Generate missing images on startup"
      description: "Automatically generates missing product images when the add-on starts."
  debug_mode:
    name: "06 · Maintenance · Debug mode"
    description: "Enables verbose debug logs for troubleshooting."
